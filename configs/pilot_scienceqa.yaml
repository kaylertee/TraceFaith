dataset:
  name: scienceqa
  split: validation
  max_examples: 30
  require_image: true
  require_explanation: true
  prefer_diagram_items: true

trace_schema:
  components:
    - visual_evidence
    - textual_evidence
    - binding_claim
    - scientific_principle
    - inference
    - conclusion
    - final_answer

interventions:
  - original
  - wrong_binding
  - wrong_visual
  - wrong_textual
  - wrong_principle
  - wrong_inference
  - delete_component
  - paraphrase

metrics:
  - answer_flip_rate
  - correctness_drop
  - necessity_score
  - sufficiency_score
  - shortcut_index
  - judge_effect_spearman
  - judge_detection_accuracy
  - judge_localization_accuracy

runtime:
  target_prompt_mode: trace_primary
  evaluation_schedule: target_then_judge
  target_model: Qwen/Qwen2.5-VL-7B-Instruct-AWQ
  judge_model: hugging-quants/Meta-Llama-3.1-8B-Instruct-AWQ-INT4
  target_quantization: auto
  judge_quantization: auto
  require_gpu: true
  evaluation_chunk_size: 1
  min_visual_tokens: 256
  max_visual_tokens: 768
  trace_max_new_tokens: 512
  judge_max_new_tokens: 192
  target_max_new_tokens: 16
