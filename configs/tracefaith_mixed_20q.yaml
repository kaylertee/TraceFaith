experiment: tracefaith
experiment_stage: mixed_scienceqa_ai2d_20q

datasets:
  scienceqa:
    split: validation
    count: 10
    require_image: true
    require_explanation: true
  ai2d:
    count: 10
    split_preference:
      - test
      - validation
      - train
    source_priority:
      - local_jsonl
      - lmms-lab/ai2d

interventions:
  - original_trace
  - paraphrase
  - wrong_binding
  - wrong_principle
  - wrong_inference
  - delete_binding_claim

shortcut_controls:
  - no_trace
  - text_only_no_trace
  - no_image_with_original_trace

resume:
  source_of_truth: per_example_transactional_checkpoints
  trace_checkpoint_dir: checkpoints/traces
  example_checkpoint_dir: checkpoints/examples

runtime:
  target_prompt_mode: trace_primary
  evaluation_schedule: target_then_judge
  target_model: Qwen/Qwen2.5-VL-7B-Instruct-AWQ
  judge_model: hugging-quants/Meta-Llama-3.1-8B-Instruct-AWQ-INT4
  target_quantization: auto
  judge_quantization: auto
  require_gpu: true
  evaluation_chunk_size: 1
  min_visual_tokens: 256
  max_visual_tokens: 768
  trace_max_new_tokens: 512
  judge_max_new_tokens: 192
  target_max_new_tokens: 16
